services:
  db:
    image: postgres:17-alpine
    container_name: proxy-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: proxymanager
      POSTGRES_PASSWORD: proxymanager
      POSTGRES_DB: proxymanager
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxymanager"]
      interval: 5s
      timeout: 3s
      retries: 10

  proxy-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: proxy-manager
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://proxymanager:proxymanager@db:5432/proxymanager"
      DATABASE_URL_SYNC: "postgresql+psycopg2://proxymanager:proxymanager@db:5432/proxymanager"
      PM_SECRET_KEY: "change-me-in-production-use-a-long-random-string"
    ports:
      - "8222:8222"

volumes:
  pgdata:
