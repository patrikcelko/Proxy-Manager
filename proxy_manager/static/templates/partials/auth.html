<div class="auth-overlay" id="auth-overlay">
    <div class="auth-card">
        <div class="auth-header">
            <img src="/static/assets/images/logo.png" alt="Proxy Manager" class="auth-logo">
            <div class="auth-header-text">
                <h1><span class="accent">Proxy</span> Manager</h1>
                <p class="auth-subtitle">HAProxy Configuration Management</p>
            </div>
        </div>
        <div class="auth-tabs" id="auth-tabs">
            <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
            <button class="auth-tab" id="auth-tab-register" onclick="switchAuthTab('register')" style="display:none">Create Account</button>
        </div>
        <div class="auth-tab-content active" id="auth-login">
            <form onsubmit="handleLogin(event)">
                <label>Email</label>
                <input type="email" id="login-email" required placeholder="admin@example.com">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="Enter password">
                <div class="auth-form-spacer"></div>
                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>
        </div>
        <div class="auth-tab-content" id="auth-register">
            <form onsubmit="handleRegister(event)">
                <label>Name</label>
                <input type="text" id="register-name" required placeholder="Your name">
                <label>Email</label>
                <input type="email" id="register-email" required placeholder="admin@example.com">
                <label>Password</label>
                <input type="password" id="register-password" required minlength="6" placeholder="Min 6 characters">
                <div class="auth-form-spacer"></div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>
        </div>
        <div class="auth-footer">
            <div class="auth-footer-copy">&copy; 2025-<script>document.write(new Date().getFullYear())</script> Proxy Manager v{{ version }}</div>
            <div class="auth-footer-github">
                Check this project on
                <a href="https://github.com/patrikcelko/Proxy-Manager" target="_blank" rel="noopener">
                    <svg width="13" height="13"><use href="#i-github"/></svg> GitHub
                </a>
            </div>
        </div>
    </div>
</div>
