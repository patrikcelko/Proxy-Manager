<section class="section" id="sec-config">
    <div class="section-header">
        <div class="info-card">
            <svg class="info-card-icon" width="18" height="18" stroke-width="2">
                <use href="#i-info" />
            </svg>
            <span>Export the current HAProxy configuration as a complete config file ready for deployment.</span>
        </div>
    </div>
    <div class="config-actions config-actions-single">
        <div class="config-panel">
            <h3>Export HAProxy Config</h3>
            <p class="config-desc">
                Generate the complete HAProxy configuration file from all database entries. Use this
                to deploy to your HAProxy server.
            </p>
            <textarea id="config-export-text" rows="18" readonly placeholder="Click Export to generate..."></textarea>
            <div class="config-btn-row">
                <button class="btn" onclick="exportConfig()">
                    <svg width="14" height="14" stroke-width="2">
                        <use href="#i-download" />
                    </svg>
                    Export
                </button>
                <button class="btn btn-secondary" onclick="copyExport()">Copy to Clipboard</button>
            </div>
        </div>
    </div>
</section>
