<section class="section" id="sec-peers">
    <div class="section-header">
        <div class="info-card">
            <svg class="info-card-icon" width="18" height="18" stroke-width="2">
                <use href="#i-info" />
            </svg>
            <span>Peer sections for stick-table synchronisation across multiple HAProxy instances.</span>
        </div>
        <button class="btn" onclick="openPeerModal()">
            <svg width="14" height="14" stroke-width="2">
                <use href="#i-plus" />
            </svg>
            Add Peer Section
        </button>
    </div>
    <div class="section-toolbar">
        <div class="search">
            <svg width="16" height="16" stroke-width="2">
                <use href="#i-search" />
            </svg>
            <input type="text" id="peer-search" placeholder="Search peers by name, comment, entry..."
                oninput="filterPeers()">
        </div>
    </div>
    <div id="peers-grid" class="items-grid"></div>
    <div class="empty-state" id="peers-empty" style="display:none">
        <svg width="48" height="48" stroke-width="1.5">
            <use href="#i-rss" />
        </svg>
        <p>No peer sections configured. Add peers for stick-table sync in HA setups.</p>
    </div>
</section>
