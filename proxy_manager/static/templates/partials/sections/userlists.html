<section class="section" id="sec-userlists">
    <div class="section-header">
        <div class="info-card">
            <svg class="info-card-icon" width="18" height="18" stroke-width="2">
                <use href="#i-info" />
            </svg>
            <div class="info-card-content">
                <strong>User Lists</strong>
                <span>
                    HTTP Basic Authentication user lists referenced by backends for access control. Passwords are
                    securely hashed with bcrypt - plain text is never stored.
                </span>
            </div>
        </div>
        <button class="btn" onclick="openUserlistModal()">
            <svg width="14" height="14" stroke-width="2">
                <use href="#i-plus" />
            </svg>
            Add User List
        </button>
    </div>
    <div class="section-toolbar">
        <div class="search">
            <svg width="16" height="16" stroke-width="2">
                <use href="#i-search" />
            </svg>
            <input type="text" id="userlist-search" placeholder="Search user lists by name or username..."
                oninput="filterUserlists()">
        </div>
    </div>
    <div id="userlists-grid" class="items-grid"></div>
    <div class="empty-state" id="userlists-empty" style="display:none">
        <svg width="48" height="48" stroke-width="1.5">
            <use href="#i-users" />
        </svg>
        <p>No user lists configured yet.</p>
        <p style="font-size:.8rem;color:var(--text-dim)">
            Create a user list to enable HTTP Basic Auth on your backends.
        </p>
    </div>
</section>
