<section class="section" id="sec-users">
    <div class="section-header">
        <div class="info-card">
            <svg class="info-card-icon" width="18" height="18" stroke-width="2">
                <use href="#i-info" />
            </svg>
            <span>Manage application users. Add new accounts or remove existing ones. Users can update their own profile via the user menu.</span>
        </div>
        <button class="btn" onclick="openAddUserModal()">
            <svg width="14" height="14" stroke-width="2"><use href="#i-plus" /></svg>
            Add User
        </button>
    </div>
    <div class="section-toolbar">
        <div class="search">
            <svg width="16" height="16" stroke-width="2">
                <use href="#i-search" />
            </svg>
            <input type="text" id="users-search" placeholder="Search users by name, email…" oninput="filterUsers()">
        </div>
    </div>
    <div id="users-grid" class="users-grid"></div>
    <div id="users-empty" class="empty-state" style="display:none">
        <svg width="40" height="40" stroke-width="1.5"><use href="#i-user" /></svg>
        <p>No users found</p>
    </div>
</section>
